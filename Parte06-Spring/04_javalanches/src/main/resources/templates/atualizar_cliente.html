!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{fragments/layout :: main-layout(~{::title}, ~{::main})}">

<head>
    <title>Javalanches - Alterar dados do cliente</title>
</head>

<body>
    <main>
        <h1 class="mb-5">Alterar dados do cliente</h1>
        <hr>
        <form method="POST" th:action="@{/atualizarCliente}">
            <div class="row">
                <input type="hidden" name="codigoCliente" th:value="${cliente.codigoCliente}">
                <!-- nome -->
                <div class="col-12 col-lg-6">
                    <label for="nome" class="form-label">Nome</label>
                    <input type="text" id="nome" name="nome" class="form-control" th:value="${cliente.nome}" required>
                </div>
                <!-- email -->
                <div class="col-12 col-md-9 col-lg-6 mb-3">
                    <label for="email" class="form-label">E-mail</label>
                    <input type="email" id="email" name="email" class="form-control" th:value="${cliente.email}" required>
                </div>
                <!-- telefone -->
                <div class="col-12 col-md-3 col-lg-4 mb-3">
                    <label for="telefone" class="form-label">Telefone</label>
                    <input type="tel" id="telefone" name="telefone" class="form-control" th:value="${cliente.telefone}" required>
                </div>
                <!-- cpf -->
                <div class="col-12 col-md-6 col-lg-4 mb-3">
                    <label for="cpf" class="form-label">CPF</label>
                    <input type="text" id="cpf" name="cpf" class="form-control" maxlength="14" th:value="${cliente.cpf}" required>
                </div>
                <!-- data de nascimento -->
                <div class="col-12 col-md-6 col-lg-4 mb-3">
                    <label for="dataNascimento" class="form-label">Data de Nascimento</label>
                    <input type="date" id="dataNascimento" name="dataNascimento" class="form-control"
                        th:value="${cliente.dataNascimento}" required>
                </div>
                <!-- botão -->
                <div class="d-flex justify-content-start mt-5 mb-5">
                    <button type="submit" class="btn btn-primary">Atualizar usuário</button>
                </div>
            </div>
        </form>

        <script>
            const form = document.querySelector('form');
            const maskCpf = document.querySelector('#cpf');
            const maskTel = document.querySelector('#telefone');
            const cep = document.querySelector('#cep');

            // máscaras de entrada
            maskCpf.addEventListener('input', function () {
                this.value = this.value
                    .replace(/\D/g, '')
                    .replace(/(\d{3})(\d)/, '$1.$2')
                    .replace(/(\d{3})(\d)/, '$1.$2')
                    .replace(/(\d{3})(\d{1,2})$/, '$1-$2');
            });

            maskTel.addEventListener('input', function () {
                this.value = this.value
                    .replace(/\D/g, '')
                    .replace(/(\d{2})(\d)/, '($1) $2')
                    .replace(/(\d{4,5})(\d)/, '$1-$2')
                    .replace(/(\d{4})\d+?$/, '$1');
            });

            // consumo da api
            const limparFormularioCep = () => {
                document.querySelector('#uf').value = ('');
                document.querySelector('#cidade').value = ('');
                document.querySelector('#bairro').value = ('');
                document.querySelector('#logradouro').value = ('');
                document.querySelector('#complemento').value = ('');
            }

            const meuCallback = (conteudo) => {
                if (!("erro" in conteudo)) {
                    document.querySelector('#uf').value = (conteudo.uf);
                    document.querySelector('#cidade').value = (conteudo.localidade);
                    document.querySelector('#bairro').value = (conteudo.bairro);
                    document.querySelector('#logradouro').value = (conteudo.logradouro);
                    document.querySelector('#complemento').value = (conteudo.complemento);
                }
                else {
                    limparFormularioCep();
                    alert("CEP não encontrado.");
                }
            }

            cep.addEventListener('input', function() {
                this.value = this.value
                    .replace(/\D/g, '')
                    .replace(/(\d{5})(\d)/, '$1-$2')
                    .replace(/(-\d{3})\d+?$/, '$1');
            });

            cep.addEventListener('blur', function () {
                let cep = document.querySelector('#cep').value.replace(/\D/g, '');

                if (cep != '') {
                    let validaCep = /^[0-9]{8}$/;

                    if (validaCep.test(cep)) {
                        document.querySelector('#uf').value = "buscando...";
                        document.querySelector('#cidade').value = "buscando...";
                        document.querySelector('#bairro').value = "buscando...";
                        document.querySelector('#logradouro').value = "buscando...";
                        document.querySelector('#complemento').value = "buscando...";

                        let script = document.createElement('script');

                        script.src = 'https://viacep.com.br/ws/' + cep + '/json/?callback=meuCallback';

                        document.body.appendChild(script);
                    }
                    else {
                        limparFormularioCep();
                        alert("Formato do CEP inválido.");
                    }
                }
                else {
                    limparFormularioCep();
                }
            });
        </script>
    </main>
</body>

</html>
